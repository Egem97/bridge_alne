{% extends 'dashboard/base.html' %}

{% block title %}Delete {{ model_name }}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-100px)] p-6 bg-gray-50">
    <div class="w-full max-w-md bg-white shadow-lg rounded-xl overflow-hidden border border-gray-100">
        <div class="p-6 text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
                <i class="fa-solid fa-triangle-exclamation text-2xl text-red-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Are you sure?</h2>
            <p class="text-gray-500 mb-8">
                You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.
            </p>

            <form method="post" class="flex items-center justify-center space-x-4">
                {% csrf_token %}
                <a href="{{ back_url }}"
                    class="w-full inline-flex justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:text-sm">
                    Cancel
                </a>
                <button type="submit"
                    class="w-full inline-flex justify-center rounded-md border border-transparent bg-red-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 sm:text-sm">
                    Yes, Delete it
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
